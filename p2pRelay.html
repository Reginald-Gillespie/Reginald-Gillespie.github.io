<!DOCTYPE html>
<html>

<head>
    <title>Relay</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #wrap {
            text-align: center;
        }

        .spinner {
            display: inline-block;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="status"><span class="spinner">↻</span></div>
        <div id="lobby"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="./p2pRelayScript.js"></script>
</body>

</html>
