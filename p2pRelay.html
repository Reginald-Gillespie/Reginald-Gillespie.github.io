<!DOCTYPE html>
<html>

<head>
    <title>P2P Relay</title>
    <style>
        .spinner {
            display: inline-block;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #status {
            font-size: 15px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <h2>Loading...</h2>
    <div id="status"><span class="spinner">↻</span> Initializing…</div>
    <div class="sub">Setting up lobby. If this step crashes, your particular network might not be supporteed.</div>
    <pre id="log"></pre>

    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="./p2pRelayScript.js"></script>
</body>

</html>
